name: Build Buzzer Alone
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v1

      - run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          
          # Compile the new Buzzer_Alone project
          arduino-cli compile --fqbn esp32:esp32:esp32 Buzzer_Alone/Buzzer_Alone.ino --export-binaries
          
          # Create the merged.bin for easy flashing
          python3 -m pip install esptool
          python3 -m esptool --chip esp32 merge_bin \
            -o Buzzer_Alone/merged.bin \
            --flash_mode dio \
            --flash_size 4MB \
            0x1000 Buzzer_Alone/build/esp32.esp32.esp32/Buzzer_Alone.ino.bootloader.bin \
            0x8000 Buzzer_Alone/build/esp32.esp32.esp32/Buzzer_Alone.ino.partitions.bin \
            0x10000 Buzzer_Alone/build/esp32.esp32.esp32/Buzzer_Alone.ino.bin

      - uses: actions/upload-artifact@v4
        with:
          name: Buzzer_Alone_Binary
          path: Buzzer_Alone/merged.bin
