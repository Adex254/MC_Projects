name: Build Scanner Project
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-arduino-cli@v1
      - run: |
          arduino-cli core update-index || echo "ok"
          arduino-cli core install esp32:esp32
          arduino-cli lib install "LiquidCrystal I2C"
          arduino-cli compile --fqbn esp32:esp32:esp32 Scanner_Project/Scanner_Project.ino --export-binaries
          python3 -m pip install esptool
          python3 -m esptool --chip esp32 merge_bin -o Scanner_Project/scanner_merged.bin --flash_mode dio --flash_size 4MB 0x1000 Scanner_Project/build/esp32.esp32.esp32/Scanner_Project.ino.bootloader.bin 0x8000 Scanner_Project/build/esp32.esp32.esp32/Scanner_Project.ino.partitions.bin 0x10000 Scanner_Project/build/esp32.esp32.esp32/Scanner_Project.ino.bin
      - uses: actions/upload-artifact@v4
        with:
          name: Scanner_Firmware
          path: Scanner_Project/scanner_merged.bin
