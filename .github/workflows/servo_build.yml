name: Build Servo Test
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Install ESP32 Core
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32Servo Library
        run: arduino-cli lib install "ESP32Servo"

      - name: Compile Servo Sketch
        run: |
          mkdir build
          arduino-cli compile --fqbn esp32:esp32:esp32 Servo_Test/Servo_Test.ino --output-dir ./build

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Servo_Firmware
          path: build/*.bin
